// -*- mode: jsonc -*-
{
    "layer": "top", // Waybar at top layer
    "position": "top", // Waybar position (top|bottom|left|right)
    "height": 30, // Waybar height (to be removed for auto height)
    "spacing": 4, // Gaps between modules (4px)
    // Choose the order of the modules
    "modules-left": [
        "hyprland/workspaces",
        "hyprland/window"
    ],
    "modules-right": [
        "network",
        "custom/sep",
        "temperature",
        "custom/sep",
        "cpu",
        "custom/sep",
        "memory",
        "custom/sep",
        "disk",
        "custom/sep",
        "battery",
        "custom/sep",
        "clock",
        "tray"
    ],
    // Modules configuration
     "hyprland/workspaces": {
         "disable-scroll": true,
         "all-outputs": true,
         "warp-on-scroll": false,
         "format": "{name}",
         "persistent-workspaces": {
            "*": 5
         }
     },
    "hyprland/window": {
        "max-length" : 40,
        "sperate-outputs" : false
    },
    "tray": {
        // "icon-size": 21,
        "spacing": 10
        // "icons": {
        //   "blueman": "bluetooth",
        //   "TelegramDesktop": "$HOME/.local/share/icons/hicolor/16x16/apps/telegram.png"
        // }
    },
    "clock": {
        // "timezone": "America/New_York",
        "tooltip-format": "<big>{:%Y %B}</big>\n<tt><small>{calendar}</small></tt>",
        "format-alt": "{:%Y-%m-%d}"
    },
    "cpu": {
        "interval": 5,
        "format": "CPU: {usage}%",
        "tooltip": true
    },
    "memory": {
        "interval": 20,
        "format": "MEM: {used}GiB"
    },
    "disk": {
        "interval": 60,
        "path": "/",
        "format": "SSD: {used}"
    },
    "temperature": {
        "interval": 10,
        "critical-threshold": 170,
        "format": "{temperatureF}°F"
    },
    "battery": {
        "interval": 10,
        "format": "BAT: {capacity}% {time}",
        "format-time": "{H}:{M}"
    },
    "network": {
        "format-wifi": "{essid} ({signalStrength}%) ",
        "format-ethernet": "{ipaddr}/{cidr} ",
        "format-disconnected": "Disconnected"
    },
    "custom/sep": {
        "format" : "|",
        "interval" : 0,
        "tooltip": false
    }
}
